spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/formwork
    username: formwork
    password: formwork
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

formwork:
  sms-channel:
    provider: TWILIO
    fallback-provider: TWILIO
    retry:
      max-attempts: 3
      backoff: 1s
    twilio:
      account-sid: AC123
      auth-token: token
      from-number: +15551234567
