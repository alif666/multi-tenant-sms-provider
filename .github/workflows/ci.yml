name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        working-directory: formwork-channel-sms
        run: mvn test
      - name: Check JaCoCo coverage
        working-directory: formwork-channel-sms
        shell: bash
        run: |
          COVERAGE=$(python - <<'PY'
import xml.etree.ElementTree as ET
tree = ET.parse('target/site/jacoco/jacoco.xml')
root = tree.getroot()
counter = next(c for c in root.findall('counter') if c.attrib['type'] == 'LINE')
missed = int(counter.attrib['missed'])
covered = int(counter.attrib['covered'])
print(0 if missed + covered == 0 else (covered * 100.0) / (missed + covered))
PY
          )
          echo "Line coverage: $COVERAGE"
          python - <<PY
coverage = float("$COVERAGE")
threshold = 80.0
if coverage < threshold:
    raise SystemExit(f"Coverage {coverage:.2f}% is below threshold {threshold:.2f}%")
PY
